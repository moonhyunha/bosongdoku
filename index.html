<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bosongdoku 🐱</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    // ---------- CONFIG ----------
    const LEVELS = Array.from({ length: 10 }, (_, i) => {
      const size = 5 + i;
      const repeats = i < 3 ? 3 : i < 7 ? 4 : 5;
      return { level: i + 1, size, colors: size, repeats };
    });

    const PALETTE = [
      "#4FC3E8","#8E7CC3","#E8C547","#D6499B","#2FB88A",
      "#F0A8C4","#E67E22","#3B82F6","#A3D977","#C0392B",
      "#9B59B6","#1ABC9C","#F39C12","#7F8C8D",
    ];

    const ICON_COUNT = 4; // ico1.png ~ ico4.png

    // ---------- PUZZLE GENERATION ----------
    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function generateStarPositions(n) {
      for (let attempt = 0; attempt < 2000; attempt++) {
        const cols = shuffle([...Array(n).keys()]);
        const positions = [];
        let ok = true;
        for (let r = 0; r < n; r++) {
          const c = cols[r];
          for (const p of positions) {
            if (Math.abs(p.r - r) <= 1 && Math.abs(p.c - c) <= 1) { ok = false; break; }
          }
          if (!ok) break;
          positions.push({ r, c });
        }
        if (ok && positions.length === n) return positions;
      }
      return null;
    }

    function generateGroups(n, stars) {
      const grid = Array.from({ length: n }, () => Array(n).fill(-1));
      stars.forEach((s, idx) => { grid[s.r][s.c] = idx; });
      const singleGroupIdx = Math.floor(Math.random() * n);
      const frontiers = stars.map((s) => [s]);
      const groupSizes = Array(n).fill(1);
      const totalCells = n * n;
      let assigned = n;
      const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
      let stuckCounter = 0;
      while (assigned < totalCells) {
        let order = shuffle([...Array(n).keys()]);
        let grew = false;
        for (const g of order) {
          if (g === singleGroupIdx) continue;
          let expanded = false;
          frontiers[g] = shuffle(frontiers[g]);
          for (let fi = 0; fi < frontiers[g].length; fi++) {
            const cell = frontiers[g][fi];
            for (const [dr, dc] of shuffle(dirs)) {
              const nr = cell.r + dr, nc = cell.c + dc;
              if (nr < 0 || nr >= n || nc < 0 || nc >= n) continue;
              if (grid[nr][nc] !== -1) continue;
              grid[nr][nc] = g;
              frontiers[g].push({ r: nr, c: nc });
              groupSizes[g]++; assigned++; expanded = true; grew = true; break;
            }
            if (expanded) break;
          }
        }
        if (!grew) { stuckCounter++; if (stuckCounter > 5) break; } else stuckCounter = 0;
      }
      for (let r = 0; r < n; r++) {
        for (let c = 0; c < n; c++) {
          if (grid[r][c] === -1) {
            let assignedG = -1;
            for (const [dr, dc] of dirs) {
              const nr = r+dr, nc = c+dc;
              if (nr>=0&&nr<n&&nc>=0&&nc<n&&grid[nr][nc]!==-1&&grid[nr][nc]!==singleGroupIdx) { assignedG=grid[nr][nc]; break; }
            }
            if (assignedG === -1) assignedG = singleGroupIdx === 0 ? (n > 1 ? 1 : 0) : 0;
            grid[r][c] = assignedG; groupSizes[assignedG]++;
          }
        }
      }
      return grid;
    }

    function validateGroups(n, grid) {
      const numGroups = Math.max(...grid.flat()) + 1;
      for (let g = 0; g < numGroups; g++) {
        let cells = [];
        for (let r = 0; r < n; r++) for (let c = 0; c < n; c++) if (grid[r][c] === g) cells.push([r,c]);
        if (cells.length === 0) return false;
        const visited = new Set();
        const stack = [cells[0]]; visited.add(cells[0].join(","));
        while (stack.length) {
          const [r,c] = stack.pop();
          for (const [dr,dc] of [[-1,0],[1,0],[0,-1],[0,1]]) {
            const nr=r+dr, nc=c+dc;
            if (nr>=0&&nr<n&&nc>=0&&nc<n&&grid[nr][nc]===g) {
              const key=`${nr},${nc}`; if (!visited.has(key)) { visited.add(key); stack.push([nr,nc]); }
            }
          }
        }
        if (visited.size !== cells.length) return false;
      }
      return true;
    }

    function generatePuzzle(n) {
      let stars = null;
      for (let i = 0; i < 50 && !stars; i++) stars = generateStarPositions(n);
      if (!stars) { stars = []; for (let r = 0; r < n; r++) stars.push({ r, c: r }); }
      let grid = null;
      for (let i = 0; i < 20; i++) {
        const g = generateGroups(n, stars);
        if (validateGroups(n, g)) { grid = g; break; }
      }
      if (!grid) grid = generateGroups(n, stars);
      const colorIndices = shuffle([...Array(PALETTE.length).keys()]).slice(0, n);
      const colors = colorIndices.map((idx) => PALETTE[idx]);
      return { grid, stars, colors, n };
    }

    // ---------- VALIDATION ----------
    function isPlacementValid(n, grid, cats, r, c) {
      for (let i = 0; i < n; i++) {
        if (i !== c && cats[r][i]) return false;
        if (i !== r && cats[i][c]) return false;
      }
      for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
        if (dr === 0 && dc === 0) continue;
        const nr = r+dr, nc = c+dc;
        if (nr>=0&&nr<n&&nc>=0&&nc<n&&cats[nr][nc]) return false;
      }
      const g = grid[r][c];
      for (let rr = 0; rr < n; rr++) for (let cc = 0; cc < n; cc++)
        if (!(rr===r&&cc===c)&&grid[rr][cc]===g&&cats[rr][cc]) return false;
      return true;
    }

    function checkWin(n, cats) {
      let count = 0;
      for (let r = 0; r < n; r++) for (let c = 0; c < n; c++) if (cats[r][c]) count++;
      return count === n;
    }

    // ---------- 고양이 아이콘 컴포넌트 ----------
    // 스테이지 시작 시 랜덤 아이콘 번호 선택 (1~4)
    const CatIcon = ({ iconNum, size }) => (
      <img
        src={`image/ico${iconNum}.png`}
        alt="cat"
        style={{ width: size * 0.7, height: size * 0.7, objectFit: 'contain' }}
      />
    );

    // 화난 고양이: 동일한 이미지 + 우측 상단 빨간 빠직 마크 반짝임
    const AngryCatIcon = ({ iconNum, size }) => (
      <div style={{ position: 'relative', width: size * 0.7, height: size * 0.7 }}>
        <img
          src={`image/ico${iconNum}.png`}
          alt="angry cat"
          style={{ width: '100%', height: '100%', objectFit: 'contain' }}
        />
        {/* 빠직 마크 */}
        <div style={{
          position: 'absolute', top: -4, right: -4,
          fontSize: size * 0.28, lineHeight: 1,
          animation: 'sparkFlash 0.15s ease-in-out infinite alternate'
        }}>💥</div>
      </div>
    );

    // ---------- MAIN ----------
    function Bosongdoku() {
      const [levelIdx, setLevelIdx] = useState(0);
      const [stage, setStage] = useState(1);
      const [puzzle, setPuzzle] = useState(null);
      const [cats, setCats] = useState(null);
      const [marks, setMarks] = useState(null);
      const [shake, setShake] = useState(null);
      const [xFlash, setXFlash] = useState(null);
      const [won, setWon] = useState(false);
      const [iconNum, setIconNum] = useState(1); // 현재 스테이지 아이콘 번호

      const levelConf = LEVELS[levelIdx];

      const newPuzzle = useCallback(() => {
        const p = generatePuzzle(levelConf.size);
        setPuzzle(p);
        setCats(Array.from({ length: p.n }, () => Array(p.n).fill(false)));
        setMarks(Array.from({ length: p.n }, () => Array(p.n).fill(false)));
        setWon(false);
        // 스테이지마다 랜덤 아이콘 선택 (1~4)
        setIconNum(Math.floor(Math.random() * ICON_COUNT) + 1);
      }, [levelConf.size]);

      useEffect(() => { newPuzzle(); }, [levelIdx, stage]);

      const handleClick = (r, c) => {
        if (!puzzle || won) return;
        if (cats[r][c]) return;
        const newMarks = marks.map((row) => [...row]);
        newMarks[r][c] = !newMarks[r][c];
        setMarks(newMarks);
      };

      const handleDoubleClick = (r, c) => {
        if (!puzzle || won) return;
        if (cats[r][c]) return;
        if (marks[r][c]) {
          setXFlash({ r, c });
          setTimeout(() => setXFlash(null), 300);
          return;
        }
        const valid = isPlacementValid(puzzle.n, puzzle.grid, cats, r, c);
        if (valid) {
          const newCats = cats.map((row) => [...row]);
          newCats[r][c] = true;
          setCats(newCats);
          if (checkWin(puzzle.n, newCats)) {
            setWon(true);
            setTimeout(() => advanceStage(), 900);
          }
        } else {
          setShake({ r, c });
          setTimeout(() => setShake(null), 600);
        }
      };

      const advanceStage = () => {
        const conf = LEVELS[levelIdx];
        if (stage < conf.repeats) { setStage(stage + 1); }
        else if (levelIdx < LEVELS.length - 1) { setLevelIdx(levelIdx + 1); setStage(1); }
      };

      const allCleared = levelIdx === LEVELS.length - 1 && stage === LEVELS[LEVELS.length-1].repeats && won;

      if (!puzzle) return null;

      const n = puzzle.n;
      const cellSizePx = Math.max(28, Math.floor(360 / n));

      return (
        <div className="min-h-screen w-full flex flex-col items-center bg-[#FBF6EF] py-6 px-3 font-sans">
          <style>{`
            @keyframes shakeFlash {
              0%,100% { transform: translate(0,0); }
              20% { transform: translate(-3px,0); }
              40% { transform: translate(3px,0); }
              60% { transform: translate(-3px,0); }
              80% { transform: translate(3px,0); }
            }
            .angry-shake { animation: shakeFlash 0.6s ease-in-out; }
            @keyframes xRedFlash {
              0%,100% { color: #ffffff; }
              50% { color: #e74c3c; }
            }
            .x-flash { animation: xRedFlash 0.3s ease-in-out; }
            @keyframes popIn {
              0% { transform: scale(0.3); opacity: 0; }
              70% { transform: scale(1.15); opacity: 1; }
              100% { transform: scale(1); opacity: 1; }
            }
            .cat-pop { animation: popIn 0.25s ease-out; }
            @keyframes sparkFlash {
              from { transform: scale(1) rotate(-10deg); opacity: 1; }
              to   { transform: scale(1.3) rotate(10deg); opacity: 0.6; }
            }
          `}</style>

          <div className="w-full max-w-md flex flex-col items-center">
            <div className="w-full flex items-center justify-between mb-1">
              <h1 className="text-2xl font-extrabold text-[#5a4a3a] tracking-tight" style={{ fontFamily: "'Trebuchet MS', sans-serif" }}>
                Bosongdoku 🐱
              </h1>
              <button onClick={newPuzzle}
                className="text-xs px-3 py-1 rounded-lg bg-[#eee0d0] text-[#8a7a6a] font-bold hover:bg-[#e0d0c0]">
                새 퍼즐
              </button>
            </div>

            <div className="w-full flex items-center justify-between bg-white rounded-xl px-4 py-2 mb-4 shadow-sm border border-[#eee0d0]">
              <span className="text-sm font-bold text-[#8a7a6a]">레벨 {levelConf.level} / {LEVELS.length}</span>
              <span className="text-sm font-bold text-[#8a7a6a]">스테이지 {stage} / {levelConf.repeats}</span>
              <span className="text-sm font-bold text-[#8a7a6a]">{n} x {n}</span>
            </div>

            <div className="grid rounded-2xl overflow-hidden shadow-md border-4 border-white"
              style={{ gridTemplateColumns: `repeat(${n}, ${cellSizePx}px)`, gridTemplateRows: `repeat(${n}, ${cellSizePx}px)` }}>
              {Array.from({ length: n }).map((_, r) =>
                Array.from({ length: n }).map((__, c) => {
                  const color = puzzle.colors[puzzle.grid[r][c]];
                  const hasCat = cats[r][c];
                  const isMarked = marks[r][c];
                  const isShaking = shake && shake.r === r && shake.c === c;
                  const isXFlashing = xFlash && xFlash.r === r && xFlash.c === c;
                  return (
                    <div key={`${r}-${c}`}
                      onClick={() => handleClick(r, c)}
                      onDoubleClick={() => handleDoubleClick(r, c)}
                      className={`flex items-center justify-center cursor-pointer select-none border border-white/40 ${isShaking ? "angry-shake" : ""}`}
                      style={{ width: cellSizePx, height: cellSizePx, backgroundColor: color }}>
                      {hasCat && !isShaking && (
                        <div className="cat-pop w-full h-full flex items-center justify-center">
                          <CatIcon iconNum={iconNum} size={cellSizePx} />
                        </div>
                      )}
                      {isShaking && (
                        <div className="w-full h-full flex items-center justify-center">
                          <AngryCatIcon iconNum={iconNum} size={cellSizePx} />
                        </div>
                      )}
                      {!hasCat && !isShaking && isMarked && (
                        <span className={`font-extrabold ${isXFlashing ? "x-flash" : "text-white"}`}
                          style={{ fontSize: cellSizePx * 0.5, lineHeight: 1 }}>✕</span>
                      )}
                    </div>
                  );
                })
              )}
            </div>

            <div className="mt-5 text-center text-sm text-[#a89a8a] leading-relaxed px-2">
              <p>한 번 클릭: X 표시 / 해제</p>
              <p>더블 클릭: 고양이 배치</p>
              <p className="mt-1 text-[#c9a98a]">같은 색 그룹, 같은 행, 같은 열, 인접한 칸에는 고양이가 하나만!</p>
            </div>

            {won && !allCleared && (
              <div className="mt-4 text-lg font-bold text-[#2FB88A] animate-pulse">클리어! 다음 스테이지로 이동합니다...</div>
            )}
            {allCleared && (
              <div className="mt-4 text-lg font-bold text-[#D6499B]">🎉 모든 스테이지를 완료했습니다! 🎉</div>
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Bosongdoku />);
  </script>
</body>
</html>
