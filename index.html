<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bosongdoku</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#FBF6EF;font-family:'Trebuchet MS',sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:24px 12px 40px;}
#title{display:flex;align-items:center;gap:4px;margin-bottom:16px;}
#title .t1{font-size:28px;font-weight:800;color:#5a4a3a;letter-spacing:-1px;}
#title .t2{font-size:28px;font-weight:800;color:#D6499B;letter-spacing:-1px;}
#status{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;justify-content:center;}
.stat-chip{background:#fff;border-radius:10px;padding:6px 16px;border:1px solid #eee0d0;font-size:13px;font-weight:700;color:#8a7a6a;}
.stat-chip.cat{color:#D6499B;}
#board{display:grid;border-radius:14px;overflow:hidden;box-shadow:0 4px 22px rgba(0,0,0,0.13);border:4px solid #fff;}
.cell{display:flex;align-items:center;justify-content:center;cursor:pointer;border:1px solid rgba(255,255,255,0.35);user-select:none;transition:filter 0.1s;position:relative;}
.cell:hover{filter:brightness(1.09);}
.x-mark{font-weight:900;color:rgba(255,255,255,0.88);line-height:1;pointer-events:none;}
.cat-wrap{position:relative;display:flex;align-items:center;justify-content:center;pointer-events:none;}
.cat-wrap img{display:block;width:100%;height:100%;object-fit:contain;}
.bazzi{position:absolute;top:-18%;right:-18%;pointer-events:none;}
#board-footer{display:flex;align-items:center;margin-top:14px;width:100%;}
#reset-btn{background:#fff;border:1.5px solid #ddd0c0;border-radius:10px;padding:8px 18px;font-size:13px;font-weight:700;color:#8a7a6a;cursor:pointer;transition:background 0.15s;box-shadow:0 2px 8px rgba(0,0,0,0.07);}
#reset-btn:hover{background:#f5ede0;}
#msg{margin-top:12px;font-size:15px;font-weight:700;min-height:22px;text-align:center;}
#hint{margin-top:10px;text-align:center;font-size:12px;color:#b0a090;line-height:1.9;}
@keyframes bazziFlash{0%,100%{opacity:1;transform:scale(1)}40%{opacity:0;transform:scale(0.7)}70%{opacity:1;transform:scale(1.15)}}
.bazzi-anim{animation:bazziFlash 0.35s ease-in-out infinite;}
@keyframes angryShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-4px)}40%{transform:translateX(4px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
.angry-wrap{animation:angryShake 0.45s ease-in-out;}
@keyframes catPop{0%{transform:scale(0.25);opacity:0}65%{transform:scale(1.18);opacity:1}100%{transform:scale(1);opacity:1}}
.cat-pop{animation:catPop 0.24s ease-out;}
</style>
</head>
<body>
<div id="title"><span class="t1">Bosong</span><span class="t2">doku</span></div>
<div id="status"></div>
<div id="board"></div>
<div id="board-footer"><button id="reset-btn">↺ 초기화</button></div>
<div id="msg"></div>
<div id="hint">클릭: 빈칸→X / 무언가 있는 칸→빈칸 &nbsp;|&nbsp; 더블클릭: 고양이 배치/해제</div>

<script>
const PALETTE=["#4FC3E8","#7C5CBF","#E8C547","#D6499B","#2FB88A","#F0A8C4","#E67E22","#3B82F6","#6DB33F","#C0392B","#9B59B6","#1ABC9C","#F39C12","#607D8B"];
const LEVELS=[...Array(10)].map((_,i)=>({level:i+1,size:5+i,repeats:i<3?3:i<7?4:5}));

function sfl(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]];}return b;}

function genStars(n){
  for(let t=0;t<3000;t++){
    const cols=sfl([...Array(n).keys()]);const pos=[];let ok=true;
    for(let r=0;r<n;r++){
      const c=cols[r];let cf=false;
      for(const p of pos){if(Math.abs(p.r-r)<=1&&Math.abs(p.c-c)<=1){cf=true;break;}}
      if(cf){ok=false;break;}pos.push({r,c});
    }
    if(ok&&pos.length===n)return pos;
  }
  return[...Array(n)].map((_,r)=>({r,c:r}));
}

function genGroups(n,stars){
  const grid=Array.from({length:n},()=>Array(n).fill(-1));
  stars.forEach((s,i)=>{grid[s.r][s.c]=i;});
  const si=0|Math.random()*n;
  const fr=stars.map(s=>[{r:s.r,c:s.c}]);
  let asgn=n;
  const dirs=[[-1,0],[1,0],[0,-1],[0,1]];
  let stk=0;
  while(asgn<n*n){
    let grew=false;
    for(const gi of sfl([...Array(n).keys()])){
      if(gi===si)continue;
      for(const cell of sfl([...fr[gi]])){
        let ex=false;
        for(const[dr,dc]of sfl(dirs)){
          const nr=cell.r+dr,nc=cell.c+dc;
          if(nr<0||nr>=n||nc<0||nc>=n||grid[nr][nc]!==-1)continue;
          grid[nr][nc]=gi;fr[gi].push({r:nr,c:nc});asgn++;ex=true;grew=true;break;
        }
        if(ex)break;
      }
    }
    if(!grew){stk++;if(stk>8)break;}else stk=0;
  }
  for(let r=0;r<n;r++)for(let c=0;c<n;c++){
    if(grid[r][c]===-1){
      let f=false;
      for(const[dr,dc]of dirs){
        const nr=r+dr,nc=c+dc;
        if(nr>=0&&nr<n&&nc>=0&&nc<n&&grid[nr][nc]!==-1&&grid[nr][nc]!==si){grid[r][c]=grid[nr][nc];f=true;break;}
      }
      if(!f)grid[r][c]=si===0?(n>1?1:0):0;
    }
  }
  return grid;
}

function genPuzzle(n){
  const stars=genStars(n);
  const grid=genGroups(n,stars);
  const colors=sfl([...Array(PALETTE.length).keys()]).slice(0,n).map(i=>PALETTE[i]);
  return{grid,stars,colors,n};
}

function isValid(n,grid,cats,r,c){
  for(let i=0;i<n;i++){
    if(i!==c&&cats[r][i])return false;
    if(i!==r&&cats[i][c])return false;
  }
  for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
    if(!dr&&!dc)continue;
    const nr=r+dr,nc=c+dc;
    if(nr>=0&&nr<n&&nc>=0&&nc<n&&cats[nr][nc])return false;
  }
  const g=grid[r][c];
  for(let rr=0;rr<n;rr++)for(let cc=0;cc<n;cc++){
    if(!(rr===r&&cc===c)&&grid[rr][cc]===g&&cats[rr][cc])return false;
  }
  return true;
}

function checkWin(n,cats){return cats.flat().filter(Boolean).length===n;}

// 만화 빠직마크 SVG
function bazziSVG(sz){
  return `<svg width="${sz}" height="${sz}" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
    <polygon points="30,2 36,20 52,10 42,26 60,28 44,36 56,52 38,44 36,60 28,44 10,54 20,38 2,34 18,26 6,10 24,20" fill="#e8000a" stroke="#fff" stroke-width="2" stroke-linejoin="round"/>
    <polygon points="30,10 34,22 46,16 38,26 52,28 40,34 50,46 36,40 34,52 28,40 16,48 24,34 10,30 24,24 14,14 26,22" fill="#ff3a3a"/>
  </svg>`;
}

function catImgHTML(iw, icoNum, angry, isNew){
  const bazziSz = Math.round(iw * 0.48);
  const wrapClass = angry ? 'cat-wrap angry-wrap' : isNew ? 'cat-wrap cat-pop' : 'cat-wrap';
  const bazzi = angry
    ? `<div class="bazzi bazzi-anim">${bazziSVG(bazziSz)}</div>`
    : '';
  return `<div class="${wrapClass}" style="width:${iw}px;height:${iw}px;">
    <img src="./image/ico${icoNum}.png" alt="cat" width="${iw}" height="${iw}"/>
    ${bazzi}
  </div>`;
}

// ---------- STATE ----------
let G={levelIdx:0,stage:1,puzzle:null,cats:null,marks:null,angry:{},won:false,icoNum:1};
let clickTimer=null;
// track which cells are "newly placed" this render cycle
let newCells={};

function mkGrid(n){return Array.from({length:n},()=>Array(n).fill(false));}

function pickIco(){return 1+(0|Math.random()*4);}

function newPuzzle(){
  const sz=LEVELS[G.levelIdx].size;
  G.puzzle=genPuzzle(sz);
  G.cats=mkGrid(G.puzzle.n);
  G.marks=mkGrid(G.puzzle.n);
  G.angry={};
  G.won=false;
  G.icoNum=pickIco();
  newCells={};
  render();
}

function resetBoard(){
  if(!G.puzzle)return;
  G.cats=mkGrid(G.puzzle.n);
  G.marks=mkGrid(G.puzzle.n);
  G.angry={};
  G.won=false;
  newCells={};
  render();
}

function render(){
  const{puzzle,cats,marks,angry,won,levelIdx,stage,icoNum}=G;
  if(!puzzle)return;
  const conf=LEVELS[levelIdx];
  const n=puzzle.n;
  const csz=Math.max(30,Math.min(56,Math.floor(Math.min(window.innerWidth-32,480)/n)));
  const iw=Math.round(csz*0.74);
  const xfs=Math.round(csz*0.42);

  const catCount=cats.flat().filter(Boolean).length;
  document.getElementById('status').innerHTML=`
    <div class="stat-chip">레벨 ${conf.level} / ${LEVELS.length}</div>
    <div class="stat-chip">스테이지 ${stage} / ${conf.repeats}</div>
    <div class="stat-chip cat">🐱 ${catCount} / ${n}</div>`;

  const board=document.getElementById('board');
  board.style.gridTemplateColumns=`repeat(${n},${csz}px)`;
  board.style.gridTemplateRows=`repeat(${n},${csz}px)`;

  let html='';
  for(let r=0;r<n;r++){
    for(let c=0;c<n;c++){
      const color=puzzle.colors[puzzle.grid[r][c]];
      const hasCat=cats[r][c];
      const isMark=marks[r][c];
      const key=`${r},${c}`;
      const isAngry=!!angry[key];
      const isNew=!!newCells[key];
      let inner='';
      if(isAngry){
        inner=catImgHTML(iw,icoNum,true,false);
      } else if(hasCat){
        inner=catImgHTML(iw,icoNum,false,isNew);
      } else if(isMark){
        inner=`<span class="x-mark" style="font-size:${xfs}px;">✕</span>`;
      }
      html+=`<div class="cell" data-r="${r}" data-c="${c}" style="width:${csz}px;height:${csz}px;background:${color};">${inner}</div>`;
    }
  }
  board.innerHTML=html;

  // clear new cells after render
  newCells={};

  const boardW=csz*n+8;
  document.getElementById('board-footer').style.width=boardW+'px';

  const allDone=levelIdx===LEVELS.length-1&&stage===LEVELS[LEVELS.length-1].repeats&&won;
  const msgEl=document.getElementById('msg');
  if(allDone) msgEl.innerHTML=`<span style="color:#D6499B;">🎉 모든 스테이지 완료!</span>`;
  else if(won) msgEl.innerHTML=`<span style="color:#2FB88A;">✨ 클리어! 다음 스테이지로...</span>`;
  else msgEl.innerHTML='';
}

// ---------- CLICK / DBLCLICK ----------
document.getElementById('board').addEventListener('click',e=>{
  const cell=e.target.closest('.cell');
  if(!cell)return;
  const r=+cell.dataset.r, c=+cell.dataset.c;
  if(clickTimer){
    clearTimeout(clickTimer);
    clickTimer=null;
    doDouble(r,c);
  } else {
    clickTimer=setTimeout(()=>{
      clickTimer=null;
      doSingle(r,c);
    },230);
  }
});

document.getElementById('board').addEventListener('dblclick',e=>e.preventDefault());

function doSingle(r,c){
  if(G.won)return;
  const hasCat=G.cats[r][c];
  const isMark=G.marks[r][c];
  if(hasCat){
    G.cats[r][c]=false;
    render();
  } else if(isMark){
    G.marks[r][c]=false;
    render();
  } else {
    G.marks[r][c]=true;
    render();
  }
}

function doDouble(r,c){
  if(G.won)return;
  const hasCat=G.cats[r][c];

  if(hasCat){
    G.cats[r][c]=false;
    render();
    return;
  }

  const hadMark=G.marks[r][c];

  if(isValid(G.puzzle.n,G.puzzle.grid,G.cats,r,c)){
    G.marks[r][c]=false;
    G.cats[r][c]=true;
    newCells[`${r},${c}`]=true;
    if(checkWin(G.puzzle.n,G.cats)){
      G.won=true;
      render();
      setTimeout(advance,1100);
    } else {
      render();
    }
  } else {
    const key=`${r},${c}`;
    G.marks[r][c]=false;
    G.angry[key]=true;
    render();
    let b=0;
    const iv=setInterval(()=>{
      b++;
      G.angry[key]=(b%2===0);
      render();
      if(b>=5){
        clearInterval(iv);
        delete G.angry[key];
        G.marks[r][c]=hadMark;
        render();
      }
    },180);
  }
}

function advance(){
  const conf=LEVELS[G.levelIdx];
  if(G.stage<conf.repeats){
    G.stage++;
  } else if(G.levelIdx<LEVELS.length-1){
    G.levelIdx++;
    G.stage=1;
  }
  newPuzzle();
}

document.getElementById('reset-btn').addEventListener('click',resetBoard);

newPuzzle();
</script>
</body>
</html>
